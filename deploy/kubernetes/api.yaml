apiVersion: apps/v1
kind: Deployment
metadata: {name: rag-api}
spec:
  replicas: 3
  selector: {matchLabels: {app: rag-api}}
  template:
    metadata: {labels: {app: rag-api}}
    spec:
      containers:
        - name: api
          image: enterprise-rag-api:latest
          ports: [{containerPort: 8000}]
          envFrom: [{configMapRef: {name: rag-config}}, {secretRef: {name: rag-secrets}}]
          readinessProbe: {httpGet: {path: /api/v1/health, port: 8000}, initialDelaySeconds: 5, periodSeconds: 10}
          resources: {requests: {cpu: 500m, memory: 1Gi}, limits: {cpu: "2", memory: 4Gi}}
---
apiVersion: v1
kind: Service
metadata: {name: rag-api}
spec:
  selector: {app: rag-api}
  ports: [{port: 8000, targetPort: 8000}]