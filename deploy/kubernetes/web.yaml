apiVersion: apps/v1
kind: Deployment
metadata: {name: rag-web}
spec:
  replicas: 2
  selector: {matchLabels: {app: rag-web}}
  template:
    metadata: {labels: {app: rag-web}}
    spec:
      containers:
        - name: web
          image: enterprise-rag-web:latest
          ports: [{containerPort: 3000}]
---
apiVersion: v1
kind: Service
metadata: {name: rag-web}
spec:
  selector: {app: rag-web}
  ports: [{port: 3000, targetPort: 3000}]